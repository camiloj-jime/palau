<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<title>Colegio Francisco Palau y Quer - Asistencia</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>
<h1>Asistencia Escolar</h1>
  <h1>Colegio Francisco Palau y Quer</h1>
</header>

<div id="message" class="message"></div>

<!-- LOGIN -->

<div class="login" id="login">

<h2>Acceso Profesores</h2>

<label>Usuario</label>
<input id="usuario" placeholder="Usuario">

<label>Contraseña</label>
<input id="clave" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

<!-- PANEL PRINCIPAL -->

<div class="panel" id="panel" style="display:none;">

<div class="dashboard">

<div class="card">
<h3>Total Estudiantes</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Presentes</h3>
<p id="presentes">0</p>
</div>

<div class="card">
<h3>Ausentes</h3>
<p id="ausentes">0</p>
</div>

</div>

<div class="controles">

<label>Año</label>
<select id="anio"></select>

<label>Mes</label>
<select id="mes">

<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>

</select>

<label>Salón</label>

<select id="salon">

<option>Prescolar</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6A</option>
<option>6B</option>
<option>7A</option>
<option>7B</option>
<option>8A</option>
<option>8B</option>
<option>9A</option>
<option>9B</option>
<option>10A</option>
<option>10B</option>
<option>11A</option>
<option>11B</option>

</select>

<label>Nombre del estudiante</label>

<input id="nombreEstudiante" placeholder="Nombre del estudiante">

<button onclick="agregar()">Agregar</button>

<label>Lista de nombres</label>

<textarea id="listaEstudiantes" rows="4"></textarea>

<button onclick="bulkAdd()">Agregar lista</button>

<div class="botones">

<button onclick="guardar()">Guardar</button>

<button onclick="irObservaciones()">Observaciones</button>

<button onclick="exportar()">Exportar Excel</button>

<button onclick="clearTable()">Limpiar tabla</button>

</div>

</div>

<div class="tabla-container">

<table id="tabla">

<tr>
<th>#</th>
<th>Nombre</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</table>

</div>

</div>

<script>

function irObservaciones(){

window.location.href="asistencia_observaciones.html";

}

</script>

<script src="script.js"></script>

</body>

</html>
