<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Colegio Francisco Palau y Quer - Asistencia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
<header>
<img src="logo.jpg" alt="Logo" class="logo">
<h1>Asistencia Escolar</h1>
<p>Colegio Francisco Palau y Quer</p>
</header>

<div id="message" class="message"></div>

<!-- LOGIN -->

<div class="login" id="login">

<h2>Acceso Profesores</h2>

<label>Usuario</label>
<input id="usuario" placeholder="Usuario">

<label>Contraseña</label>
<input id="clave" type="password" placeholder="Contraseña">

<button onclick="login()">Ingresar</button>

</div>

<!-- PANEL PRINCIPAL -->

<div class="panel" id="panel" style="display:none;">

<div class="dashboard">

<div class="card">
<h3>Total Estudiantes</h3>
<p id="total">0</p>
</div>

<div class="card">
<h3>Presentes</h3>
<p id="presentes">0</p>
</div>

<div class="card">
<h3>Ausentes</h3>
<p id="ausentes">0</p>
</div>

</div>

<div class="controles">

<label>Año</label>
<select id="anio"></select>

<label>Mes</label>
<select id="mes">

<option>Enero</option>
<option>Febrero</option>
<option>Marzo</option>
<option>Abril</option>
<option>Mayo</option>
<option>Junio</option>
<option>Julio</option>
<option>Agosto</option>
<option>Septiembre</option>
<option>Octubre</option>
<option>Noviembre</option>
<option>Diciembre</option>

</select>

<label>Salón</label>

<select id="salon">

<option>Prescolar</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6A</option>
<option>6B</option>
<option>7A</option>
<option>7B</option>
<option>8A</option>
<option>8B</option>
<option>9A</option>
<option>9B</option>
<option>10A</option>
<option>10B</option>
<option>11A</option>
<option>11B</option>

</select>
  <label>Buscar Estudiante del Curso</label>

<select id="selectorEstudiantesCurso" onchange="filtrarPorEstudianteSeleccionado()">
<option value="">-- Ver Todos --</option>
</select>

<label>O agregar nuevo estudiante</label>

<div class="busqueda-container">
  <input id="nombreEstudiante" placeholder="Nombre del estudiante" style="margin-top: 0;">
</div>

<button onclick="agregar()">Agregar</button>

<label>Lista de nombres</label>

<textarea id="listaEstudiantes" rows="4"></textarea>

<button onclick="bulkAdd()">Agregar lista</button>

<div class="botones-grid">
<button onclick="guardar()" class="btn-primary">Guardar</button>
<button onclick="abrirObservaciones()" class="btn-secondary">Observaciones</button>
<button onclick="exportar()" class="btn-info">Descargar Asistencia</button>
<button onclick="eliminarTodosCurso()" class="btn-delete">Eliminar Curso</button>
<button onclick="clearTable()" class="btn-danger">Limpiar tabla</button>
<button onclick="logout()" class="btn-logout">Cerrar sesión</button>
</div>

</div>
<div class="tabla-container">

<table id="tabla">

<tr>
<th>#</th>
<th>Nombre</th>
<th>Estado</th>
<th>Acciones</th>
</tr>

</table>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script src="script.js"></script>
</body>
</html>
