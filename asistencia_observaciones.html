<body>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, doc, getDoc, setDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDt1A5_sJmuXNTMUxAbHdO0awcq8BLMXXE",
  authDomain: "palaud.firebaseapp.com",
  projectId: "palaud",
  storageBucket: "palaud.firebasestorage.app",
  messagingSenderId: "303175661771",
  appId: "1:303175661771:web:c38dce685c3696202f834e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// hacer las funciones globales
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.query = query;
window.where = where;
window.doc = doc;
window.getDoc = getDoc;
window.setDoc = setDoc;
window.deleteDoc = deleteDoc;
window.onSnapshot = onSnapshot;

</script>

<script src="script.js" defer></script>

<script>

let todosEstudiantes = {};

function cargarEstudiantesParaObservaciones(){

window.todosEstudiantes={};

for(let i=0;i<localStorage.length;i++){

const key=localStorage.key(i);

if(key && key!=="observaciones"){

try{

const data=JSON.parse(localStorage.getItem(key))||[];

const parts=key.match(/(\d{4})(Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre)(.+)/);

if(parts){

const grado=parts[3];

data.forEach(d=>{

if(d.nombre){

window.todosEstudiantes[d.nombre]=grado;

}

});

}

}catch(e){}

}

}

}

function filtrarEstudiantes(){

const query=document.getElementById("obsEstudiante").value.toLowerCase();

const sugerencias=document.getElementById("estudiantesSugerencias");

sugerencias.innerHTML="";

if(query.length===0){

sugerencias.style.display="none";

return;

}

const matches=Object.keys(window.todosEstudiantes).filter(nombre=>nombre.toLowerCase().includes(query));

if(matches.length>0){

sugerencias.style.display="block";

matches.forEach(nombre=>{

const div=document.createElement("div");

div.textContent=nombre+" ("+window.todosEstudiantes[nombre]+")";

div.style.padding="8px";

div.style.cursor="pointer";

div.style.borderBottom="1px solid #eee";

div.onclick=()=>{

document.getElementById("obsEstudiante").value=nombre;

document.getElementById("obsGrado").value=window.todosEstudiantes[nombre];

sugerencias.innerHTML="";

sugerencias.style.display="none";

};

sugerencias.appendChild(div);

});

}else{

sugerencias.style.display="none";

}

}

document.addEventListener("click",(e)=>{

if(e.target.id!=="obsEstudiante"){

document.getElementById("estudiantesSugerencias").style.display="none";

}

});

function volverAsistencia(){

window.location.href="index.html";

}

document.addEventListener("DOMContentLoaded",function(){

cargarEstudiantesParaObservaciones();

if(typeof cargarObservaciones==="function"){

cargarObservaciones();

}

// Listener para cambio de grado en observaciones
document.getElementById("grado").addEventListener("change", async function() {
    const gradoSeleccionado = this.value;
    if (!gradoSeleccionado) return;
    
    try {
        // Cargar estudiantes de Firebase filtrados por grado
        const q = window.query(
            window.collection(window.db, "estudiantes"),
            window.where("grado", "==", gradoSeleccionado)
        );
        
        const querySnapshot = await window.getDocs(q);
        const estudiantesDiv = document.getElementById("estudiantesSugerencias");
        estudiantesDiv.innerHTML = "";
        
        if (querySnapshot.size === 0) {
            estudiantesDiv.innerHTML = "<div style='padding:10px; color:#999;'>No hay estudiantes en este grado</div>";
            return;
        }
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement("div");
            div.textContent = data.nombre;
            div.style.padding = "8px";
            div.style.cursor = "pointer";
            div.style.borderBottom = "1px solid #eee";
            div.onclick = () => {
                document.getElementById("obsEstudiante").value = data.nombre;
                document.getElementById("obsGrado").value = data.grado;
                estudiantesDiv.innerHTML = "";
                estudiantesDiv.style.display = "none";
            };
            estudiantesDiv.appendChild(div);
        });
        
        estudiantesDiv.style.display = "block";
    } catch (error) {
        console.error("Error al cargar estudiantes:", error);
        alert("Error al cargar estudiantes");
    }
});

});

</script>

</body>
</html>
