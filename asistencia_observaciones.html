<html lang="es">

<head>

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Observaciones - Colegio Francisco Palau y Quer</title>

<link rel="icon" href="logo.jpg" type="image/jpeg">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs, query, where, setDoc, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDt1A5_sJmuXNTMUxAbHdO0awcq8BLMXXE",
  authDomain: "palaud.firebaseapp.com",
  projectId: "palaud",
  storageBucket: "palaud.firebasestorage.app",
  messagingSenderId: "303175661771",
  appId: "1:303175661771:web:c38dce685c3696202f834e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// hacer las funciones globales
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.getDocs = getDocs;
window.query = query;
window.where = where;
window.setDoc = setDoc;
window.doc = doc;
window.onSnapshot = onSnapshot;
window.getDoc = getDoc;

</script>

</head>

<body>

<header>
<img src="logo.jpg" alt="Logo" class="logo">
<h1>Observaciones</h1>
<p>Colegio Francisco Palau y Quer</p>
</header>

<div id="message" class="message"></div>

<div id="observaciones">

<h3>Observaciones de Estudiantes</h3>

<h4>Información Básica</h4>

<div class="estudiante-container">

<input id="obsEstudiante" placeholder="Escribir nombre del estudiante" onkeyup="filtrarEstudiantes()">

<div id="estudiantesSugerencias"></div>

</div>

<input id="obsGrado" placeholder="Grado" readonly>

<input id="obsFecha" type="date">

<input id="obsDocente" placeholder="Docente">

<h4>Detalles de la Observación</h4>

<textarea id="obsDesempeno" rows="2" placeholder="Desempeño"></textarea>

<textarea id="obsLlamados" rows="2" placeholder="Llamados de atención"></textarea>

<textarea id="obsAnotaciones" rows="2" placeholder="Anotaciones"></textarea>

<textarea id="obsAcciones" rows="2" placeholder="Acciones restaurativas"></textarea>

<textarea id="obsFicha" rows="2" placeholder="Ficha"></textarea>

<textarea id="obsSanciones" rows="2" placeholder="Sanciones"></textarea>

<textarea id="obsCompromiso" rows="2" placeholder="Compromiso de convivencia"></textarea>

<textarea id="obsObservaciones" rows="3" placeholder="Observaciones"></textarea>

<br><br>

<button onclick="guardarObservacion()">Guardar Observación</button>

<button onclick="exportarObservaciones('filtro')">Descargar selección (curso + estudiante + fecha)</button>
<button onclick="exportarObservaciones()">Descargar todas las observaciones</button>
<button onclick="exportarObservaciones('curso')">Descargar por curso</button>
<button onclick="exportarObservaciones('estudiante')">Descargar por nombre</button>
<button onclick="exportarObservaciones('fecha')">Descargar por fecha</button>

<button onclick="volverAsistenciaConSesion()">Volver a Asistencia</button>

<h4>Filtrar por fecha y curso</h4>

<label style="font-weight:600; margin-right:8px;">Desde:</label>
<input id="fechaInicioFiltro" type="date" style="margin-right:12px;" />
<label style="font-weight:600; margin-right:8px;">Hasta:</label>
<input id="fechaFinFiltro" type="date" style="margin-right:12px;" />
<button onclick="cargarObservaciones()" style="margin-right:10px;">Aplicar Filtros</button>
<button id="toggleObservacionesBtn" onclick="toggleObservacionesVisibility()" style="margin-bottom:10px;">Ocultar observaciones</button>

<h4>Buscar por curso</h4>

<select id="searchCurso" onchange="cargarObservaciones()">

<option value="">--Seleccionar curso--</option>

<option>Prescolar</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6A</option>
<option>6B</option>
<option>7A</option>
<option>7B</option>
<option>8A</option>
<option>8B</option>
<option>9A</option>
<option>9B</option>
<option>10A</option>
<option>10B</option>
<option>11A</option>
<option>11B</option>

</select>

<button onclick="mostrarConteoCurso()">Contar observaciones</button>

<div id="conteoCurso" class="message info" style="display:none; margin-top:10px;"></div>

<h4>Buscar por estudiante</h4>

<input id="searchEstudianteInput" placeholder="Buscar estudiante (nombre)" onkeyup="buscarObservacionesPorEstudiante()" style="width: calc(100% - 10px); padding: 8px; margin-bottom: 8px;" />
<div id="searchEstudianteSugerencias" style="display:none; border: 1px solid #ccc; border-radius: 4px; max-height: 180px; overflow-y: auto; background: white;"></div>

<button onclick="buscarObservacionesPorEstudiante()">Aplicar búsqueda por estudiante</button>

<div id="listaObservaciones" style="margin-top:20px;"></div>

</div>

<script type="module" src="firebase.js"></script>

<script src="script.js"></script>

<script>

let todosEstudiantes = {};

async function cargarEstudiantesParaObservaciones(){
    window.todosEstudiantes = {};

    try {
        const querySnapshot = await getDocs(collection(db, "estudiantes"));
        querySnapshot.forEach((docSnap) => {
            const data = docSnap.data();
            if (data && data.nombre) {
                const nombre = data.nombre.trim();
                if (nombre.length > 0) {
                    todosEstudiantes[nombre] = data.grado || "";
                }
            }
        });
    } catch (error) {
        console.error("Error cargando estudiantes desde Firebase:", error);
    }

    // Fallback: cargar desde localStorage si no hay datos en Firestore
    if (Object.keys(todosEstudiantes).length === 0) {
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key !== "observaciones") {
                try {
                    const data = JSON.parse(localStorage.getItem(key)) || [];
                    const parts = key.match(/(\d{4})(Enero|Febrero|Marzo|Abril|Mayo|Junio|Julio|Agosto|Septiembre|Octubre|Noviembre|Diciembre)(.+)/);
                    if (parts) {
                        const grado = parts[3];
                        data.forEach(d => {
                            if (d.nombre) {
                                todosEstudiantes[d.nombre] = grado;
                            }
                        });
                    }
                } catch (e) {
                    console.error("Error leyendo localStorage para estudiantes:", e);
                }
            }
        }
    }
}

function filtrarEstudiantes(){
    const query = document.getElementById("obsEstudiante").value.toLowerCase();
    const sugerencias = document.getElementById("estudiantesSugerencias");
    sugerencias.innerHTML = "";

    if (query.length === 0) {
        sugerencias.style.display = "none";
        return;
    }

    const matches = Object.keys(todosEstudiantes).filter(nombre => nombre.toLowerCase().includes(query));

    if (matches.length > 0) {
        sugerencias.style.display = "block";
        matches.slice(0, 20).forEach(nombre => {
            const div = document.createElement("div");
            div.textContent = nombre + " (" + todosEstudiantes[nombre] + ")";
            div.style.padding = "8px";
            div.style.cursor = "pointer";
            div.style.borderBottom = "1px solid #eee";
            div.onclick = () => {
                document.getElementById("obsEstudiante").value = nombre;
                document.getElementById("obsGrado").value = todosEstudiantes[nombre] || "";
                sugerencias.innerHTML = "";
                sugerencias.style.display = "none";
            };
            sugerencias.appendChild(div);
        });
    } else {
        sugerencias.style.display = "none";
    }
}

document.addEventListener("click",(e)=>{
    if(e.target.id!=="obsEstudiante"){
        document.getElementById("estudiantesSugerencias").style.display="none";
    }
    if(e.target.id!=="searchEstudianteInput"){
        const se = document.getElementById("searchEstudianteSugerencias");
        if (se) se.style.display = "none";
    }
});

function volverAsistencia(){

window.location.href="index.html";

}

document.addEventListener("DOMContentLoaded",function(){

cargarEstudiantesParaObservaciones();

if(typeof cargarObservaciones==="function"){

cargarObservaciones();

}

// Verificar sesión para regresar
if (!sessionStorage.getItem("usuarioLogueado")) {
    alert("Sesión expirada. Regresando al login.");
    window.location.href = "index.html";
}

});

</script>

</body>
</html>
